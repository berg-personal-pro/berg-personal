<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="description" content="Berg Personal Pro - Análise biomecânica com IA">
    
    <title>Berg Personal Pro</title>
    
    <!-- Firebase SDKs (Versão Compat - URLs Corretos) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --primary: #ff6b35;
            --dark: #0a0a0f;
            --text: #ffffff;
            --card: #12121a;
            --error: #ff4444;
            --success: #00c851;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--dark);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container {
            padding: 30px;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(255, 107, 53, 0.15);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 107, 53, 0.1);
        }

        .auth-logo { 
            font-size: 60px; 
            margin-bottom: 15px;
            filter: drop-shadow(0 0 20px rgba(255, 107, 53, 0.3));
        }
        
        h1 { 
            color: var(--primary); 
            margin: 0 0 10px 0;
            font-size: 28px;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            color: #888;
            margin-bottom: 25px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0;
            border-radius: 12px;
            border: 2px solid #2a2a35;
            background: #1a1a25;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border: none;
            color: white;
            font-weight: 600;
            font-size: 16px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            margin-top: 10px;
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 107, 53, 0.1);
        }

        .message {
            padding: 12px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background: rgba(255, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid var(--error);
            display: block;
        }

        .message.success {
            background: rgba(0, 200, 81, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
            display: block;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        button.loading .spinner { display: block; }
        button.loading .btn-text { display: none; }
    </style>
</head>
<body>

    <div class="container" id="login-container">
        <div class="auth-logo">💪</div>
        <h1>Berg Personal Pro</h1>
        <p class="subtitle">Análise biomecânica com IA</p>
        
        <div id="message" class="message"></div>
        
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
        <input type="password" id="password" placeholder="Senha (mín. 6 caracteres)" autocomplete="current-password">
        
        <button id="btn-login" onclick="fazerLogin()">
            <span class="btn-text">Entrar</span>
            <div class="spinner"></div>
        </button>
        
        <button id="btn-register" class="btn-secondary" onclick="criarConta()">
            <span class="btn-text">Criar Conta</span>
            <div class="spinner"></div>
        </button>
    </div>

    <script>
        // ⚠️ VERIFIQUE SUA API KEY - Deve ter 39 caracteres após "AIzaSy"
        const firebaseConfig = {
  apiKey: "AIzaSyCsaa0s8CuYSvmfS7P3daBVApPgrPaFw1g",
  authDomain: "berg-personal-pro.firebaseapp.com",
  projectId: "berg-personal-pro",
  storageBucket: "berg-personal-pro.firebasestorage.app",
  messagingSenderId: "82347101730",
  appId: "1:82347101730:web:ea58eb587b7c62835c047b"
};

        // Inicializa Firebase
        try {
            firebase.initializeApp(firebaseConfig);
            console.log("✅ Firebase inicializado");
        } catch (error) {
            console.error("❌ Erro Firebase:", error);
            showMessage("Erro ao conectar com o servidor", "error");
        }

        const auth = firebase.auth();
        const db = firebase.firestore();

        // Mostra mensagens na tela (melhor que alert)
        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
            setTimeout(() => msgDiv.className = 'message', 5000);
        }

        // Validação de email
        function validarEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // Estado de loading nos botões
        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            btn.disabled = loading;
            btn.classList.toggle('loading', loading);
        }

        // Login
        async function fazerLogin() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;

            if (!email || !pass) {
                showMessage("Preencha email e senha", "error");
                return;
            }

            if (!validarEmail(email)) {
                showMessage("Email inválido", "error");
                return;
            }

            setLoading('btn-login', true);

            try {
                await auth.signInWithEmailAndPassword(email, pass);
                showMessage("Login realizado! Redirecionando...", "success");
                // Aqui você redireciona para o app principal
                // window.location.href = '/dashboard.html';
            } catch (error) {
                let msg = "Erro no login";
                if (error.code === 'auth/user-not-found') msg = "Usuário não encontrado";
                else if (error.code === 'auth/wrong-password') msg = "Senha incorreta";
                else if (error.code === 'auth/invalid-credential') msg = "Credenciais inválidas";
                else msg = error.message;
                
                showMessage(msg, "error");
                console.error(error);
            } finally {
                setLoading('btn-login', false);
            }
        }

        // Criar conta
        async function criarConta() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;

            if (!email || !pass) {
                showMessage("Preencha email e senha", "error");
                return;
            }

            if (!validarEmail(email)) {
                showMessage("Email inválido", "error");
                return;
            }

            if (pass.length < 6) {
                showMessage("A senha deve ter no mínimo 6 caracteres", "error");
                return;
            }

            setLoading('btn-register', true);

            try {
                await auth.createUserWithEmailAndPassword(email, pass);
                showMessage("Conta criada com sucesso!", "success");
            } catch (error) {
                let msg = "Erro ao criar conta";
                if (error.code === 'auth/email-already-in-use') msg = "Este email já está cadastrado";
                else if (error.code === 'auth/invalid-email') msg = "Email inválido";
                else msg = error.message;
                
                showMessage(msg, "error");
                console.error(error);
            } finally {
                setLoading('btn-register', false);
            }
        }

        // Enter para login
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fazerLogin();
        });

        // Service Worker (opcional - crie o arquivo sw.js primeiro)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log("✅ Service Worker registrado"))
                .catch(err => console.log("⚠️ SW não registrado:", err));
        }

        // Verifica se usuário já está logado
        auth.onAuthStateChanged(user => {
            if (user) {
                console.log("👤 Usuário logado:", user.email);
                // Redirecionar para dashboard se já estiver autenticado
            }
        });
    </script>
</body>
</html>
