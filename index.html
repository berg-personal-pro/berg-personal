<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <title>Berg Personal Pro - IA</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    
    <!-- IA TensorFlow & Pose -->
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdn.jsdelivr.net"></script>

    <style>
        :root { --primary: #ff6b35; --dark: #0a0a0f; --text: #ffffff; --danger: #ff4444; }
        body { background: var(--dark); color: var(--text); font-family: sans-serif; margin: 0; overflow: hidden; }
        .screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 15px; text-align: center; }
        .hidden { display: none !important; }
        
        /* Feedback Box */
        #feedback-box {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px;
            border: 2px solid var(--primary); width: 85%; z-index: 100;
            transition: all 0.3s;
        }
        .error-alert { border-color: var(--danger) !important; color: var(--danger) !important; animation: shake 0.5s; }
        
        .video-container { position: relative; width: 100%; aspect-ratio: 3/4; background: #000; border-radius: 20px; overflow: hidden; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        button { width: 100%; max-width: 300px; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: black; }
        
        @keyframes shake { 0% { transform: translateX(-52%); } 50% { transform: translateX(-48%); } 100% { transform: translateX(-50%); } }
    </style>
</head>
<body>

    <div id="loading" class="screen">
        <p>Carregando Inteligência Biomecânica...</p>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="mainApp" class="screen hidden" style="padding-top: 80px;">
        
        <div id="feedback-box">
            <b id="status-ia" style="color: var(--primary);">🤖 Analisando Movimento...</b>
            <p id="msg-ia" style="font-size: 14px; margin: 5px 0 0;">Posicione-se em frente à câmera.</p>
        </div>

        <div class="video-container">
            <video id="video" playsinline></video>
            <canvas id="output"></canvas>
        </div>

        <div style="width: 100%; max-width: 320px; margin-top: 10px;">
            <button class="btn-primary" onclick="iniciarTudo()">ATIVAR IA COM VOZ</button>
            <button style="background: transparent; border: 1px solid #333; color: #888;" onclick="location.reload()">Resetar</button>
        </div>
    </div>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCsaa0s8CuySvmfS7P3daBVAppPgrPaFwig",
            authDomain: "berg-personal-pro.firebaseapp.com",
            projectId: "berg-personal-pro",
            storageBucket: "berg-personal-pro.firebasestorage.app",
            messagingSenderId: "82347101730",
            appId: "1:82347101730:web:ea58eb587b7c62835c047b"
        };
        firebase.initializeApp(firebaseConfig);

        // VARS IA
        let detector;
        let ultimaMensagem = "";
        let audioAtivo = true;

        firebase.auth().onAuthStateChanged(user => {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
        });

        // FUNÇÃO DE VOZ (Texto para Fala)
        function falar(texto) {
            if (texto === ultimaMensagem) return; // Não repetir a mesma frase
            ultimaMensagem = texto;
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(texto);
            utter.lang = 'pt-BR';
            utter.rate = 1.1;
            synth.speak(utter);
        }

        async function iniciarTudo() {
            falar("Iniciando análise biomecânica. Por favor, afaste-se.");
            const video = document.getElementById('video');
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            await video.play();
            
            const model = poseDetection.SupportedModels.MoveNet;
            detector = await poseDetection.createDetector(model);
            requestAnimationFrame(analisar);
        }

        // CÁLCULO DE ÂNGULO ENTRE 3 PONTOS
        function calcularAngulo(A, B, C) {
            let radians = Math.atan2(C.y - B.y, C.x - B.x) - Math.atan2(A.y - B.y, A.x - B.x);
            let angle = Math.abs(radians * 180.0 / Math.PI);
            if (angle > 180) angle = 360 - angle;
            return angle;
        }

        async function analisar() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('output');
            const ctx = canvas.getContext('2d');
            const feedbackBox = document.getElementById('feedback-box');
            const msgIA = document.getElementById('msg-ia');
            const statusIA = document.getElementById('status-ia');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            const poses = await detector.estimatePoses(video);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (poses.length > 0) {
                const pts = poses[0].keypoints;
                
                // Pegar pontos principais (Ombro, Cotovelo, Pulso) para Rosca Direta
                const ombro = pts[6]; 
                const cotovelo = pts[8];
                const pulso = pts[10];

                if (ombro.score > 0.5 && cotovelo.score > 0.5 && pulso.score > 0.5) {
                    const angulo = calcularAngulo(ombro, cotovelo, pulso);
                    
                    // --- LÓGICA DE CORREÇÃO ---
                    if (angulo < 40) {
                        feedbackBox.className = "error-alert";
                        statusIA.innerText = "❌ ERRO DETECTADO";
                        msgIA.innerText = "Cotovelo muito fechado! Não suba demais a carga.";
                        falar("Não suba demais a carga, mantenha a tensão muscular.");
                    } 
                    else if (angulo > 160) {
                        feedbackBox.className = "error-alert";
                        statusIA.innerText = "⚠️ ATENÇÃO";
                        msgIA.innerText = "Evite estender totalmente para não lesionar.";
                        falar("Cuidado! Não estenda totalmente o braço.");
                    }
                    else {
                        feedbackBox.className = "";
                        statusIA.innerText = "✅ EXCELENTE";
                        statusIA.style.color = "#06ffa5";
                        msgIA.innerText = "Movimento controlado. Continue assim!";
                    }
                }

                // Desenhar pontos no canvas
                pts.forEach(kp => {
                    if (kp.score > 0.5) {
                        ctx.fillStyle = "#ff6b35";
                        ctx.beginPath();
                        ctx.arc(kp.x, kp.y, 5, 0, 2 * Math.PI);
                        ctx.fill();
                    }
                });
            }
            requestAnimationFrame(analisar);
        }
    </script>
</body>
</html>
